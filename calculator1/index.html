<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator </title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="shortcut icon" href="./img/icon.jpg" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <form>
                <div class="display">
                    <input type="text" name="display" disabled>
                </div>
                <div>
                    <input type="button" value="AC" onclick="display.value ='' " class="ac rounded-circle">
                    <input type="button" class="del rounded-circle" value="Del" onclick="display.value =display.value.toString().slice (0,-1)">
                    <input type="button" class="symbols rounded-circle" value="." onclick="display.value +='.'">
                    <input type="button" class="symbols rounded-circle" value="/" onclick="display.value +='/'">
                </div>
                <div>
                    <input type="button" class="NumpadBtns rounded-circle" value="7" onclick="display.value +='7'">
                    <input type="button" class="NumpadBtns rounded-circle" value="8" onclick="display.value +='8'">
                    <input type="button" class="NumpadBtns rounded-circle" value="9" onclick="display.value +='9'">
                    <input type="button" class="symbols rounded-circle" value="*" onclick="display.value +='*'">
                </div>
                <div>
                    <input type="button" class="NumpadBtns rounded-circle" value="4" onclick="display.value +='4'">
                    <input type="button" class="NumpadBtns rounded-circle" value="5" onclick="display.value +='5'">
                    <input type="button" class="NumpadBtns rounded-circle" value="6" onclick="display.value +='6'">
                    <input type="button" class="symbols rounded-circle" value="-" onclick="display.value +='-'">
                </div>
                <div>
                    <input type="button" class="NumpadBtns rounded-circle" value="1" onclick="display.value +='1'">
                    <input type="button" class="NumpadBtns rounded-circle" value="2" onclick="display.value +='2'">
                    <input type="button" class="NumpadBtns rounded-circle" value="3" onclick="display.value +='3'">
                    <input type="button" class="symbols rounded-circle" value="+" onclick="display.value +='+'">
                </div>
                <div>
                    <input type="button" class="special rounded-circle" value="00" onclick="display.value +='00'">
                    <input type="button" class="special rounded-circle" value="0" onclick="display.value += '0'">
                    <input type="button" value="=" onclick="display.value = eval(display.value)" class="equal rounded-pill">
                </div>
            </form>
        </div>
    </div>
</body>
</html>
